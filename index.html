<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sai_naveen_059 | Profile</title>
    <style>
        :root {
            --bg: #000;
            --insta-grad: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            --text: #fff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            text-align: center;
            width: 300px;
        }
        .story-border {
            width: 120px;
            height: 120px;
            background: var(--insta-grad);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
        }
        .inner-circle {
            width: 110px;
            height: 110px;
            background: black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
        }
        h1 { font-size: 24px; margin: 10px 0; }
        p { color: #a8a8a8; font-size: 16px; margin-bottom: 30px; }
        .btn {
            background: #363636;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
        }
        .btn:hover { background: #474747; }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="story-border">
            <div class="inner-circle">SN</div>
        </div>
        <h1>Sai Naveen</h1>
        <p>Registration No: 059</p>
        <a href="#" class="btn">View TOC Projects</a>

</body>
</html>
