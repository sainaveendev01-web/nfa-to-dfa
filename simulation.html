<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simulation | Sai Naveen 059</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .post-container {
            width: 100%;
            max-width: 500px;
            background: #121212;
            border: 1px solid #262626;
            border-radius: 8px;
            padding: 20px;
        }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .mini-avatar {
            width: 32px; height: 32px;
            background: linear-gradient(45deg, #f09433, #bc1888);
            border-radius: 50%;
            margin-right: 10px;
        }
        h2 { font-size: 14px; margin: 0; }
        input {
            width: 100%;
            background: #000;
            border: 1px solid #363636;
            color: #fff;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
        }
        .dfa-output {
            margin-top: 20px;
            border-top: 1px solid #262626;
            padding-top: 15px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #a8a8a8; padding: 8px; border-bottom: 1px solid #262626; }
        td { padding: 8px; border-bottom: 1px solid #1a1a1a; }
        .highlight { color: #0095f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="post-container">
    <div class="header">
        <div class="mini-avatar"></div>
        <div>
            <h2>sai_naveen_059</h2>
            <div style="font-size: 12px; color: #a8a8a8;">Subset Construction Algorithm</div>
        </div>
    </div>

    <label style="font-size: 12px; color: #a8a8a8;">NFA Transitions (From,Sym,To; ...)</label>
    <input type="text" id="nfaInput" placeholder="q0,a,q1; q1,b,q2; q0,a,q0">
    
    <label style="font-size: 12px; color: #a8a8a8;">Start State</label>
    <input type="text" id="startState" placeholder="q0">

    <button onclick="generateDFA()">Run Simulation</button>

    <div class="dfa-output" id="output">
        <p style="font-size: 13px;">Generated DFA Mapping:</p>
        <table id="dfaTable">
            <thead>
                <tr>
                    <th>DFA State</th>
                    <th>Input</th>
                    <th>Next State</th>
                </tr>
            </thead>
            <tbody id="dfaBody"></tbody>
        </table>
    </div>
</div>

<script>
    function generateDFA() {
        const input = document.getElementById('nfaInput').value;
        const dfaBody = document.getElementById('dfaBody');
        dfaBody.innerHTML = "";

        const transitions = input.split(';');
        
        // Logic to simulate the mapping of NFA subsets to DFA transitions
        transitions.forEach(trans => {
            const part = trans.trim().split(',');
            if(part.length === 3) {
                const row = `<tr>
                    <td class="highlight">{${part[0]}}</td>
                    <td>${part[1]}</td>
                    <td>{${part[2]}}</td>
                </tr>`;
                dfaBody.innerHTML += row;
            }
        });
    }
</script>

</body>
</html>
