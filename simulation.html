<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sai_naveen_059 | Working Simulation</title>
    <style>
        :root { --insta-blue: #0095f6; --bg: #000; --card: #121212; --border: #262626; --accent: #ff3040; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding: 20px; }
        .insta-post { max-width: 500px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
        .header { padding: 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
        .avatar { width: 32px; height: 32px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-radius: 50%; margin-right: 12px; }
        .content { padding: 20px; }
        
        label { font-size: 11px; color: #8e8e8e; text-transform: uppercase; font-weight: 700; display: block; margin-top: 15px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; background: var(--insta-blue); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        
        #console { background: #050505; color: #00ff41; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 12px; margin-top: 20px; height: 150px; overflow-y: auto; border: 1px solid #1a1a1a; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th { text-align: left; color: #8e8e8e; border-bottom: 1px solid var(--border); padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; }
        .state-text { color: var(--insta-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="insta-post">
    <div class="header">
        <div class="avatar"></div>
        <div style="font-size: 14px; font-weight: 600;">sai_naveen_059 <span style="font-weight:400; color:#8e8e8e;">• Algorithm</span></div>
    </div>
    
    <div class="content">
        <label>1. States (e.g., q0,q1)</label>
        <input type="text" id="states" value="q0,q1">

        <label>2. Alphabet (e.g., 0,1)</label>
        <input type="text" id="alphabet" value="0,1">

        <label>3. Transitions (from,sym,to; from,sym,to)</label>
        <input type="text" id="trans" value="q0,0,q0;q0,0,q1;q1,1,q1">

        <button onclick="runSubsetConstruction()">Convert NFA to DFA</button>

        <div id="console">System Ready... Waiting for input.</div>

        <table id="resultTable">
            <thead>
                <tr><th>DFA Subset State</th><th>Input</th><th>Next Subset State</th></tr>
            </thead>
            <tbody id="resBody"></tbody>
        </table>
    </div>
</div>

<script>
function runSubsetConstruction() {
    const states = document.getElementById('states').value.split(',').map(s => s.trim());
    const alphabet = document.getElementById('alphabet').value.split(',').map(s => s.trim());
    const transRaw = document.getElementById('trans').value.split(';').map(s => s.trim());
    const consoleLog = document.getElementById('console');
    const tableBody = document.getElementById('resBody');

    consoleLog.innerHTML = "Initializing Sai Naveen's Engine...<br>";
    tableBody.innerHTML = "";

    // Step 1: Map NFA Transitions
    let nfa = {};
    transRaw.forEach(t => {
        let [from, sym, to] = t.split(',');
        if (!nfa[from]) nfa[from] = {};
        if (!nfa[from][sym]) nfa[from][sym] = [];
        nfa[from][sym].push(to);
    });

    // Step 2: Subset Construction Logic
    let startState = [states[0]]; 
    let queue = [startState];
    let visited = [];

    function getName(arr) { return arr.length > 0 ? "{" + arr.sort().join(',') + "}" : "Φ"; }

    while (queue.length > 0) {
        let currentArr = queue.shift();
        let currentName = getName(currentArr);

        if (visited.includes(currentName)) continue;
        visited.push(currentName);

        consoleLog.innerHTML += `> Exploring ${currentName}...<br>`;

        alphabet.forEach(symbol => {
            let nextStatesSet = new Set();
            
            // For every NFA state in the current DFA subset, find targets
            currentArr.forEach(s => {
                if (nfa[s] && nfa[s][symbol]) {
                    nfa[s][symbol].forEach(target => nextStatesSet.add(target));
                }
            });

            let nextArr = Array.from(nextStatesSet).sort();
            let nextName = getName(nextArr);

            // Update Table
            tableBody.innerHTML += `<tr>
                <td class="state-text">${currentName}</td>
                <td style="color:#f09433">${symbol}</td>
                <td class="state-text">${nextName}</td>
            </tr>`;

            if (!visited.includes(nextName) && nextName !== "Φ") {
                queue.push(nextArr);
                consoleLog.innerHTML += `&nbsp;&nbsp;Found new state: ${nextName}<br>`;
            }
        });
    }
    consoleLog.innerHTML += "<strong>Success: DFA Generated!</strong>";
}
</script>

</body>
</html>
