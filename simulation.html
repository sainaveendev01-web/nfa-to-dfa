<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>sai_naveen_059 | Workflow Simulation</title>
    <style>
        :root { --insta-blue: #0095f6; --bg: #000; --card: #121212; --border: #262626; }
        body { background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 25px; }
        .user-header { display: flex; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .avatar { width: 40px; height: 40px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); border-radius: 50%; margin-right: 15px; }
        h2 { font-size: 16px; margin: 0; }
        
        .input-section label { font-size: 11px; color: #8e8e8e; text-transform: uppercase; font-weight: 700; display: block; margin-top: 15px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; background: var(--insta-blue); color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { opacity: 0.8; }

        .workflow-log { margin-top: 30px; background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 13px; color: #00ff41; height: 250px; overflow-y: auto; border: 1px solid #333; }
        .table-area { margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; color: #8e8e8e; border-bottom: 1px solid var(--border); padding: 10px; font-size: 11px; }
        td { padding: 10px; border-bottom: 1px solid #1a1a1a; }
        .state { color: #fb923c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-header">
        <div class="avatar"></div>
        <div>
            <h2>sai_naveen_059</h2>
            <div style="font-size: 12px; color: #8e8e8e;">Subset Construction Workflow</div>
        </div>
    </div>

    <div class="input-section">
        <label>1. Define Alphabet (e.g., 0,1)</label>
        <input type="text" id="alphabet" value="0,1">

        <label>2. NFA Transitions (From,Sym,To; ...)</label>
        <input type="text" id="transitions" value="q0,0,q0; q0,0,q1; q1,1,q1">

        <label>3. Start State</label>
        <input type="text" id="start" value="q0">
    </div>

    <button onclick="startWorkflow()">Run Conversion Workflow</button>

    <div class="workflow-log" id="log">Logs will appear here...</div>

    <div class="table-area">
        <table id="dfaTable">
            <thead>
                <tr><th>DFA State (Set)</th><th>Input</th><th>Result (Set)</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
function startWorkflow() {
    const log = document.getElementById('log');
    const tableBody = document.getElementById('tableBody');
    const alphabet = document.getElementById('alphabet').value.split(',').map(s => s.trim());
    const transRaw = document.getElementById('transitions').value.split(';');
    const startNode = document.getElementById('start').value.trim();

    log.innerHTML = "Initializing workflow for Sai Naveen 059...<br>";
    tableBody.innerHTML = "";

    // Parse Transitions into a Map
    let nfa = {};
    transRaw.forEach(t => {
        let [from, sym, to] = t.split(',').map(s => s.trim());
        if (!nfa[from]) nfa[from] = {};
        if (!nfa[from][sym]) nfa[from][sym] = [];
        nfa[from][sym].push(to);
    });

    // DFA Construction logic
    let dfaStates = [];
    let queue = [[startNode]];
    let visited = [];

    function stateToName(stateArr) {
        return "{" + stateArr.sort().join(',') + "}";
    }

    log.innerHTML += "> Start state: " + stateToName([startNode]) + "<br>";

    while (queue.length > 0) {
        let currentSubset = queue.shift();
        let currentName = stateToName(currentSubset);

        if (visited.includes(currentName)) continue;
        visited.push(currentName);
        log.innerHTML += `> Processing State: ${currentName}<br>`;

        alphabet.forEach(symbol => {
            let nextSubset = new Set();
            currentSubset.forEach(nfaState => {
                if (nfa[nfaState] && nfa[nfaState][symbol]) {
                    nfa[nfaState][symbol].forEach(s => nextSubset.add(s));
                }
            });

            if (nextSubset.size > 0) {
                let nextArr = Array.from(nextSubset);
                let nextName = stateToName(nextArr);
                
                log.innerHTML += `&nbsp;&nbsp;&nbsp;On input '${symbol}' -> ${nextName}<br>`;
                
                // Add to result table
                tableBody.innerHTML += `<tr>
                    <td class="state">${currentName}</td>
                    <td>${symbol}</td>
                    <td class="state">${nextName}</td>
                </tr>`;

                if (!visited.includes(nextName)) {
                    queue.push(nextArr);
                }
            } else {
                // Trap state logic
                tableBody.innerHTML += `<tr><td>${currentName}</td><td>${symbol}</td><td>{∅}</td></tr>`;
            }
        });
    }
    log.innerHTML += "<strong>Workflow Complete!</strong>";
}
</script>

</body>
</html>
